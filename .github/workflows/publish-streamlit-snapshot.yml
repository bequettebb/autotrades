name: Publish Streamlit Snapshot

on:
  workflow_dispatch:

jobs:
  refresh_snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure bundled snapshot exists
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cloud
          if [ ! -f status.json ]; then
            echo "status.json is missing" >&2
            exit 1
          fi
          cp status.json cloud/status.json

      - name: Commit updated snapshot if needed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud/status.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Refresh bundled snapshot"
          git push
